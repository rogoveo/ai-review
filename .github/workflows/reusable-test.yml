name: Test

on:
  workflow_call:
    inputs:
      config-file:
        type: string
        default: "./ai_review/tests/configs/config-test.yaml"
        required: false
      python-version:
        type: string
        default: "3.12"
        required: false

jobs:
  action:
    env:
      AI_REVIEW_CONFIG_FILE_YAML: ${{ inputs.config-file }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: pip install .[test] pytest pytest-cov

      - name: Run tests
        run: pytest --cov=ai_review --cov-report=xml --cov-report=term-missing

    runs-on: ubuntu-latest
